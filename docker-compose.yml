# docker-compose.yml
services:
  rcm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rcm-server
    restart: unless-stopped

    # ── NETWORK MODE: HOST ────────────────────────────────────────────────────
    # The server must bind on the host network stack directly, not inside
    # Docker's isolated bridge network.
    #
    # Why this is required:
    #   The SOCKS proxy and reverse port forward features work by having the
    #   agent connect BACK to the server on a randomly-assigned tunnel port
    #   (e.g. 0.0.0.0:54321 picked by the OS). Docker's bridge network only
    #   forwards ports explicitly listed in "ports:" — ephemeral tunnel ports
    #   are never listed, so the agent's TcpStream::connect() to that port
    #   silently fails. The tunnel never forms, SOCKS traffic has nowhere to
    #   go, and every proxied request times out.
    #
    # With network_mode: host, all ports the server binds (4443, 8080, and
    # any dynamic tunnel ports) are immediately reachable on the host's IP
    # without any forwarding rules.
    #
    # Trade-off: the container shares the host's network namespace, so it
    # can see and bind any host port. For a C2 server this is acceptable —
    # the container is already trusted with persistent data volumes.
    #
    # Note: "ports:" mappings are ignored with network_mode: host (they're
    # handled implicitly). They're kept here as documentation.
    network_mode: host

    volumes:
      # ── Persistent runtime data (host-mounted) ─────────────────────
      - ./certs:/app/certs:ro
      - ./logs:/app/logs
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./modules:/app/modules
      - ./extensions:/app/extensions
      - ./dist:/app/dist
      - ./panel:/app/panel
      - ./c2_audit.db:/app/c2_audit.db

      # ── Cargo cache (named volumes) ────────────────────────────────
      # Persist the crate registry and incremental build cache so
      # subsequent agent builds inside the container are fast.
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/app/target

    environment:
      - RUST_LOG=info
      - CARGO_HOME=/usr/local/cargo
      - RUSTUP_HOME=/usr/local/rustup

    working_dir: /app

    mem_limit: 6g
    memswap_limit: 6g

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  cargo-registry:
    driver: local
  cargo-git:
    driver: local
  cargo-target:
    driver: local
