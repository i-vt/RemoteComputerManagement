# tests/docker/docker-compose.yml
#
# Integration test environment for RCM.
#
# Usage:
#   # Full suite (default — waits for agents, runs everything):
#   docker compose up --build --abort-on-container-exit --exit-code-from test-runner
#
#   # Smoke suite (API-only, no agents needed, fast):
#   TEST_SUITE=smoke docker compose up --build --abort-on-container-exit --exit-code-from test-runner
#
# Architecture:
#   ┌────────────┐     ┌────────────┐
#   │test-runner  │────▶│ c2-server  │◀──── agent-1 (TLS)
#   │(curl/bash)  │     │ API :8080  │◀──── agent-2 (HTTP)
#   └────────────┘     │ TLS :4443  │
#                      │ HTTP:4480  │
#   ┌────────────┐     └────────────┘
#   │mock-service│  (rportfwd target, returns known payload)
#   │  :80       │
#   └────────────┘
#   ┌────────────┐
#   │webhook-sink│  (captures POSTs, writes to /webhooks/*)
#   │  :9999     │
#   └────────────┘

name: rcm-integration

services:

  # ── Team Server ─────────────────────────────────────────────────────
  c2-server:
    image: docker-c2-server
    build:
      context: ../../
      dockerfile: tests/docker/Dockerfile
      target: server
    hostname: c2-server
    volumes:
      - shared:/shared          # agent binaries + credentials exchange
    environment:
      - RCM_TEST_MODE=1
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{\"username\":\"probe\",\"password\":\"probe\"}' http://127.0.0.1:8080/api/auth/login | grep -qE '^(200|401|403)'"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - c2net

  # ── Test Agent (TLS transport) ──────────────────────────────────────
  agent-1:
    image: docker-agent-1
    build:
      context: ../../
      dockerfile: tests/docker/Dockerfile
      target: agent
    hostname: agent-tls
    volumes:
      - shared:/shared:ro
    environment:
      - AGENT_NAME=agent-tls
      - AGENT_TRANSPORT=tls
    depends_on:
      c2-server:
        condition: service_healthy
    networks:
      - c2net

  # ── Test Agent (HTTP transport) ─────────────────────────────────────
  agent-2:
    image: docker-agent-2
    build:
      context: ../../
      dockerfile: tests/docker/Dockerfile
      target: agent
    hostname: agent-http
    volumes:
      - shared:/shared:ro
    environment:
      - AGENT_NAME=agent-http
      - AGENT_TRANSPORT=http
    depends_on:
      c2-server:
        condition: service_healthy
    networks:
      - c2net

  # ── Test Agent (hibernation / dweller mode) ─────────────────────────
  # Connects every ~5s (sleep=5, jitter=0-2). The short sleep ensures it
  # appears in /api/hosts before the 90s agent-readiness timeout expires,
  # giving test_12_hibernation a session with hibernation_mode=true to test.
  agent-hibernation:
    image: docker-agent-hibernation
    build:
      context: ../../
      dockerfile: tests/docker/Dockerfile
      target: agent
    hostname: agent-hibernation
    volumes:
      - shared:/shared:ro
    environment:
      - AGENT_NAME=agent-hibernation
      - AGENT_TRANSPORT=hibernation
    depends_on:
      c2-server:
        condition: service_healthy
    networks:
      - c2net

  # ── Mock internal service (rportfwd target) ─────────────────────────
  mock-service:
    image: nginx:alpine
    hostname: mock-service
    volumes:
      - ./scripts/mock-index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - c2net

  # ── Webhook receiver (captures POST payloads) ──────────────────────
  webhook-sink:
    image: python:3.12-alpine
    hostname: webhook-sink
    command: ["python3", "/app/webhook_server.py"]
    volumes:
      - ./scripts/webhook_server.py:/app/webhook_server.py:ro
      - webhooks:/webhooks
    networks:
      - c2net

  # ── Test Runner ─────────────────────────────────────────────────────
  test-runner:
    image: alpine:3.20
    depends_on:
      c2-server:
        condition: service_healthy
    volumes:
      - ./scripts:/tests:ro
      - shared:/shared:ro
      - webhooks:/webhooks:ro
    environment:
      - C2_URL=http://c2-server:8080
      - WEBHOOK_URL=http://webhook-sink:9999/hook
      - TEST_SUITE=${TEST_SUITE:-full}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl jq bash coreutils > /dev/null 2>&1
        echo "=== Waiting for credentials ==="
        for i in $$(seq 1 60); do
          [ -f /shared/admin_creds.json ] && break
          sleep 1
        done
        if [ ! -f /shared/admin_creds.json ]; then
          echo "FATAL: admin_creds.json never appeared"; exit 1
        fi
        echo "=== Running integration tests (suite: $${TEST_SUITE:-full}) ==="
        bash /tests/run_tests.sh
    networks:
      - c2net

volumes:
  shared:
  webhooks:

networks:
  c2net:
    driver: bridge
