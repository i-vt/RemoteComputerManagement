      - ./scripts/pivot-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      AGENT_NAME: c1-hop1
      PIVOT_BINARY: agent-tls
      PIVOT_DELAY: "0"
    depends_on:
      c2-server: { condition: service_healthy }
    networks: [c2net]

  c1-hop2:
    profiles: ["pivot-win"]
    platform: windows/amd64
    build: { context: ../../, dockerfile: tests/docker/Dockerfile.windows }
    hostname: c1-hop2
    volumes:
      - shared:/shared:ro
      - ./scripts/pivot-entrypoint-windows.ps1:/entrypoint.ps1:ro
    entrypoint: ["powershell", "-ExecutionPolicy", "Bypass", "-File", "C:\\entrypoint.ps1"]
