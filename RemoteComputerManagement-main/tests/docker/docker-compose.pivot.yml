      AGENT_NAME: c0-hop4
      PIVOT_BINARY: c0h4
      PIVOT_DELAY: "45"
    depends_on:
      c2-server: { condition: service_healthy }
    networks: [c2net]

  # ════════════════════════════════════════════════════════════════════
  # Chain 1: C2 → Linux → Windows → Windows → Linux
  # ════════════════════════════════════════════════════════════════════

  c1-hop1:
