# tests/docker/docker-compose.pivot.yml
#
# Compose OVERRIDE for 4-chain pivot stress testing.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ Chains                                                              │
# ├─────────────────────────────────────────────────────────────────────┤
# │ Chain 0 (Linux-only):  C2 → L → L → L → L   (profile: pivot)      │
# │ Chain 1:               C2 → L → W → W → L   (profile: pivot-win)  │
# │ Chain 2:               C2 → W → W → L → L   (profile: pivot-win)  │
# │ Chain 3:               C2 → W → L → W → L   (profile: pivot-win)  │
# └─────────────────────────────────────────────────────────────────────┘
#
# Usage:
#   # Linux-only chain (works on any host):
#   docker compose -f docker-compose.yml -f docker-compose.pivot.yml \
#     --profile pivot up --build --abort-on-container-exit --exit-code-from test-runner
#
#   # All chains including Windows (Windows host only):
#   docker compose -f docker-compose.yml -f docker-compose.pivot.yml \
#     --profile pivot --profile pivot-win \
#     up --build --abort-on-container-exit --exit-code-from test-runner

services:

  # ── Override: build pivot agents & extend test runner ─────────────────

  c2-server:
    build:
      context: ../../
      dockerfile: tests/docker/Dockerfile
      target: server
      args:
        BUILD_PIVOT_AGENTS: "true"

  test-runner:
    image: alpine:3.20   # explicit so Docker Compose v2 validates the merge
    environment:
      - C2_URL=http://c2-server:8080
      - WEBHOOK_URL=http://webhook-sink:9999/hook
      - PIVOT_TEST=1
      - TEST_SUITE=pivot
    command:
      - -c
      - |
        apk add --no-cache curl jq bash coreutils > /dev/null 2>&1
        echo "=== Waiting for credentials ==="
        for i in $$(seq 1 60); do
          [ -f /shared/admin_creds.json ] && break
          sleep 1
        done
        if [ ! -f /shared/admin_creds.json ]; then
          echo "FATAL: admin_creds.json never appeared"; exit 1
        fi
        echo "=== Running integration tests (suite: pivot) ==="
        bash /tests/run_tests.sh

  # ════════════════════════════════════════════════════════════════════
  # Chain 0: C2 → Linux → Linux → Linux → Linux
  # ════════════════════════════════════════════════════════════════════

  c0-hop1:
    image: docker-agent-1   # pre-built by run_tests.sh; all Linux hop agents share the same stage
    profiles: ["pivot"]
    build: { context: ../../, dockerfile: tests/docker/Dockerfile, target: agent }
    hostname: c0-hop1
    volumes:
      - shared:/shared:ro
      - ./scripts/pivot-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      AGENT_NAME: c0-hop1
      PIVOT_BINARY: agent-tls
      PIVOT_DELAY: "0"
    depends_on:
      c2-server: { condition: service_healthy }
    networks: [c2net]

  c0-hop2:
    image: docker-agent-1   # pre-built by run_tests.sh; all Linux hop agents share the same stage
    profiles: ["pivot"]
    build: { context: ../../, dockerfile: tests/docker/Dockerfile, target: agent }
    hostname: c0-hop2
    volumes:
      - shared:/shared:ro
      - ./scripts/pivot-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      AGENT_NAME: c0-hop2
      PIVOT_BINARY: c0h2
      PIVOT_DELAY: "15"
    depends_on:
      c2-server: { condition: service_healthy }
    networks: [c2net]

  c0-hop3:
    image: docker-agent-1   # pre-built by run_tests.sh; all Linux hop agents share the same stage
    profiles: ["pivot"]
    build: { context: ../../, dockerfile: tests/docker/Dockerfile, target: agent }
    hostname: c0-hop3
    volumes:
      - shared:/shared:ro
      - ./scripts/pivot-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      AGENT_NAME: c0-hop3
      PIVOT_BINARY: c0h3
      PIVOT_DELAY: "30"
    depends_on:
      c2-server: { condition: service_healthy }
    networks: [c2net]

  c0-hop4:
    image: docker-agent-1   # pre-built by run_tests.sh; all Linux hop agents share the same stage
    profiles: ["pivot"]
    build: { context: ../../, dockerfile: tests/docker/Dockerfile, target: agent }
    hostname: c0-hop4
    volumes:
      - shared:/shared:ro
      - ./scripts/pivot-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
