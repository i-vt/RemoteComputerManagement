# tests/docker/docker-compose.unit.yml
#
# Unit test runner for RCM feature modules.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  Service        What runs                                           │
# │  ───────────    ──────────────────────────────────────────────────  │
# │  unit-all       cargo test --lib (NO FILTER — every test)          │
# │  unit-topology  cargo test --lib topology::tests                    │
# │  unit-transport cargo test --lib transport::tests                   │
# │  unit-database  cargo test --lib queued_task_tests                  │
# │  unit-hibernation cargo test --lib hibernation::tests               │
# │  unit-interface  cargo test --lib interface_tests                   │
# │  unit-extension  cargo test --test test_extensions                  │
# └─────────────────────────────────────────────────────────────────────┘
#
# Usage:
#
#   # Full suite — nothing excluded (USE THIS for CI / final validation)
#   docker compose -f tests/docker/docker-compose.unit.yml \
#     run --rm unit-all
#
#   # One module — for fast targeted debugging
#   docker compose -f tests/docker/docker-compose.unit.yml \
#     run --rm unit-topology
#
#   # Via the helper script (recommended)
#   ./run_tests.sh              # all tests, no filter
#   ./run_tests.sh --module database

name: rcm-unit-tests

# ── Shared build config ────────────────────────────────────────────────────────
x-build: &build
  context: ../../
  dockerfile: tests/docker/Dockerfile.unit
  target: test
  args:
    LITCRYPT_ENCRYPT_KEY: "${LITCRYPT_ENCRYPT_KEY:-rcm-unit-test-dummy-key-0000000000}"

# ── Shared runtime config ──────────────────────────────────────────────────────
x-env: &env
  RUST_TEST_NOCAPTURE: "1"
  RUST_BACKTRACE: "1"

services:

  # ── Full suite — NO FILTER ─────────────────────────────────────────────────
  # Runs every #[test] in the library. Command is set explicitly here so the
  # result is the same regardless of what the Dockerfile CMD says.
  unit-all:
    build: *build
    environment: *env
    command: cargo test -- --nocapture --test-threads=1

  # ── Individual module services — for targeted debugging only ───────────────
  # These intentionally filter to one module so failures are fast to diagnose.
  # Do NOT use these for CI — a passing module run does not mean all tests pass.

  unit-topology:
    build: *build
    environment: *env
    command: >
      cargo test --lib topology::tests -- --nocapture --test-threads=1

  unit-transport:
    build: *build
    environment: *env
    command: >
      cargo test --lib transport::tests -- --nocapture --test-threads=1

  unit-database:
    build: *build
    environment: *env
    command: >
      cargo test --lib queued_task_tests -- --nocapture --test-threads=1

  unit-hibernation:
    build: *build
    environment: *env
    command: >
      cargo test --lib hibernation::tests -- --nocapture --test-threads=1

  unit-interface:
    build: *build
    environment: *env
    command: >
      cargo test --lib interface_tests -- --nocapture --test-threads=1

  unit-extension:
    build: *build
    image: rcm-unit-tests-unit-all   # reuse the pre-built unit-all image
    environment: *env
    command: cargo test --test test_extensions -- --nocapture --test-threads=1

  # Integration test suites (run specific test files)
  unit-dga:
    build: *build
    image: rcm-unit-tests-unit-all   # reuse the pre-built unit-all image
    environment: *env
    command: cargo test --test test_dga -- --nocapture --test-threads=1

  unit-fallback:
    build: *build
    image: rcm-unit-tests-unit-all   # reuse the pre-built unit-all image
    environment: *env
    command: cargo test --test test_fallback -- --nocapture --test-threads=1
